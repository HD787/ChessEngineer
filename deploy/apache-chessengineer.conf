# Apache route for Chess Engineer.
#
# Assumes:
#   - Next.js UI is running on http://127.0.0.1:3101/chessengineer
#   - Python websocket model server is running on ws://127.0.0.1:8787
#
# Include this inside the henryderrick.com HTTPS VirtualHost.

ProxyPreserveHost On
ProxyTimeout 600

ProxyPass        /chessengineer/model-ws ws://127.0.0.1:8787/ retry=0 timeout=600
ProxyPassReverse /chessengineer/model-ws ws://127.0.0.1:8787/

ProxyPass        /chessengineer/ http://127.0.0.1:3101/chessengineer/ retry=0 timeout=600
ProxyPassReverse /chessengineer/ http://127.0.0.1:3101/chessengineer/

ProxyPass        /chessengineer http://127.0.0.1:3101/chessengineer retry=0 timeout=600
ProxyPassReverse /chessengineer http://127.0.0.1:3101/chessengineer
